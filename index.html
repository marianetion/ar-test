<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Product AR Experience</title>

    <link rel="stylesheet" href="styles.css" />

    <script
      type="module"
      src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.1.0/model-viewer.min.js"
    ></script>
  </head>

  <body>
    <main class="page">
      <section class="hero">
        <div class="viewer-card">
          <model-viewer
            id="productViewer"
            src="models/model-a.glb"
            ios-src="models/model-a.usdz"
            alt="3D model of Model A"
            ar
            ar-modes="quick-look scene-viewer webxr"
            ar-scale="auto"
            camera-controls
            touch-action="pan-y"
            auto-rotate
            shadow-intensity="1"
            exposure="1"
            environment-image="neutral"
            poster=""
          >
            <button slot="ar-button" class="ar-button">
              Ver en tu espacio
            </button>

            <div class="loading" slot="poster">
              Cargando modelo 3D...
            </div>
          </model-viewer>
        </div>

        <div class="content">
          <p class="eyebrow">AR Preview</p>
          <h1>Ve el producto en tu espacio </h1>

          <p class="description">
            Elige un modelo, previsualiza la versión 3D y míralo en tu espacio usando Realidad Aumentada
          </p>

          <div class="options" aria-label="Product model options">
            <button
              class="option is-active"
              data-name="Model A"
              data-glb="models/model-a.glb"
              data-usdz="models/model-a.usdz"
            >
              Modelo A
            </button>

            <button
              class="option"
              data-name="Model B"
              data-glb="models/model-b.glb"
              data-usdz="models/model-b.usdz"
            >
              Modelo B
            </button>
          </div>

         
        </div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
